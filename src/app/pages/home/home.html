<div class="container py-2">
  <h1 class="h3 mb-4">Listado de usuarios</h1>

  @if (loading) {
    <p class="text-muted">Cargando usuarios…</p>
  } @else if (errorMsg) {
    <div class="alert alert-danger" role="alert">{{ errorMsg }}</div>
  } @else if (users.length === 0) {
    <p class="text-muted">No hay usuarios que mostrar.</p>
  } @else {
    <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
      @for (user of users; track user.id) {
        <div class="col">
          <div class="card h-100 shadow-sm border-0 home-user-card">
            <img
              [src]="user.image"
              class="card-img-top home-user-img"
              [alt]="'Foto de ' + user.first_name"
            />
            <div class="card-body d-flex flex-column">
              <h2 class="h6 card-title mb-3">{{ user.first_name }} {{ user.last_name }}</h2>
              <div class="mt-auto d-grid gap-2">
                <a class="btn btn-primary btn-sm" [routerLink]="['/user', user.id]">Ver detalle</a>
                <a class="btn btn-outline-secondary btn-sm" [routerLink]="['/updateuser', user.id]"
                  >Actualizar</a
                >
                <button type="button" class="btn btn-outline-danger btn-sm" (click)="onDelete(user, $event)">
                  Borrar
                </button>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
